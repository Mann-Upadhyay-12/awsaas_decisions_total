version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.go
    container_name: awsaas_backend
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:awsaas@postgres:5432/awsaas
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: awsaas_postgres
    environment:
      POSTGRES_DB: awsaas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: awsaas
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: awsaas_prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: awsaas_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=awsaas123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
    container_name: awsaas_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  grafana_data:
